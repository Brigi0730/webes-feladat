<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Névnapkereső</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <section class="kereso-doboz">
        <h1>Névnapkereső</h1>
        <p>Keress dátum vagy keresztnév alapján.</p>

        <label for="nap">Dátum:</label>
        <input type="text" id="nap" placeholder="pl. 4-30">

        <label for="nev">Keresztnév:</label>
        <input type="text" id="nev" placeholder="pl. Katalin">

        <button onclick="kereses()">Keresés</button>
        <button onclick="torles()">Törlés</button>
    </section>

    <section class="eredmeny-doboz">
        <h2>Eredmény</h2>
        <div id="eredmeny">
            Itt jelenik meg a keresés eredménye.
        </div>
    </section>

</div>

<script src="script.js"></script>
</body>
</html>
